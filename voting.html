<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Supply Giveaway Voting Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="voting">
    <main class="page">
      <section class="card">
        <p class="badge">🗳️ Community Voting</p>
        <h1>Vote for the ₱200 Winners</h1>

        <div class="tab-actions">
          <a href="/entry.html" class="secondary-btn">Entry Form</a>
          <a href="/voting.html" class="secondary-btn is-active">Voting Page</a>
        </div>

        <section id="votingTab" class="tab-panel is-active">
          <p class="subtitle">Before voting, fill in voter details (name, age, location). Each vote gives <strong>10 points</strong>. <strong>1 device = 1 vote only.</strong></p>

          <form id="voterForm" class="form compact">
            <label>Voter Name<input type="text" name="voter_name" required /></label>
            <label>Voter Age<input type="number" name="voter_age" min="13" max="120" required /></label>
            <label>Taga Saan / Location<input type="text" name="voter_location" required /></label>
            <button type="submit" class="primary-btn">Continue to Vote List</button>
            <p id="voterStatus" class="status-text" aria-live="polite"></p>
          </form>

          <div id="voteListWrap" class="vote-list-wrap hidden">
            <h2>Vote List (Candidates)</h2>
            <p class="status-text">Choose one candidate. Highest vote count wins. Top 2 will receive ₱200 each.</p>
            <ul id="candidateList" class="candidate-list"></ul>
            <p id="voteStatus" class="status-text" aria-live="polite"></p>
          </div>
        </section>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
  </body>
</html>
